name: Weekly Upstream Sync

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Require automation token
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        run: |
          if [ -z "$AUTOMATION_PAT" ]; then
            echo "::error::AUTOMATION_PAT is required so weekly sync PRs trigger CI."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: dev
          token: ${{ secrets.AUTOMATION_PAT }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Refresh all locale sources and generated data
        run: bun run content:refresh

      - name: Classify sync diff
        id: diff
        run: bun run content:check-sync-diff

      - name: Skip metadata-only changes
        if: steps.diff.outputs.changed == 'true' && steps.diff.outputs.semanticChanged != 'true'
        run: |
          echo "Only metadata/timestamp changes were detected. No PR will be opened."

      - name: Create pull request
        if: steps.diff.outputs.semanticChanged == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AUTOMATION_PAT }}
          commit-message: "chore(content): weekly sync from upstream javascript-questions"
          title: "chore(content): weekly upstream sync (all locales)"
          body-path: ${{ steps.diff.outputs.bodyPath }}
          branch: chore/weekly-content-sync
          base: dev
          delete-branch: true
          labels: |
            content
            automation
