name: Promote Dev to Main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  promote_dev:
    runs-on: ubuntu-latest
    steps:
      - name: Require automation token
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        run: |
          if [ -z "$AUTOMATION_PAT" ]; then
            echo "::error::AUTOMATION_PAT is required so promotion PRs trigger CI."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Open promotion PR and enable auto-merge
        uses: ./.github/actions/branch-sync
        with:
          base: main
          head: dev
          title: "chore(release): promote dev to main"
          body: |
            Automated production promotion from `dev` to `main`.

            Branch protection keeps this blocked until required CI passes.
          auto_merge: "true"
          token: ${{ secrets.AUTOMATION_PAT }}
