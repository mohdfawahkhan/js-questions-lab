name: CI

on:
  push:
    branches: [dev]
    paths-ignore:
      - CHANGELOG.md
      - .release-please-manifest.json
      - package.json
      - apps/web/package.json
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
      metadata_only: ${{ steps.meta.outputs.metadata_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect E2E-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            e2e:
              - 'apps/web/app/**'
              - 'apps/web/components/**'
              - 'apps/web/e2e/**'
              - 'apps/web/lib/**'
              - 'apps/web/messages/**'
              - 'apps/web/playwright.config.ts'
              - 'content/**'
              - 'scripts/**'
              - 'bun.lock'

      - name: Classify metadata-only changes
        id: meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            mapfile -t changed < <(
              git diff --name-only \
                "${{ github.event.pull_request.base.sha }}"..."${{ github.event.pull_request.head.sha }}"
            )
          else
            if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              echo "metadata_only=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            mapfile -t changed < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          if [ "${#changed[@]}" -eq 0 ]; then
            echo "metadata_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          metadata_only=true
          for file in "${changed[@]}"; do
            case "$file" in
              CHANGELOG.md|.release-please-manifest.json|package.json|apps/web/package.json) ;;
              *)
                metadata_only=false
                break
                ;;
            esac
          done

          if [ "$metadata_only" = "true" ]; then
            echo "metadata_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "metadata_only=false" >> "$GITHUB_OUTPUT"
          fi

  typecheck:
    name: Typecheck
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Metadata-only fast path
        if: needs.changes.outputs.metadata_only == 'true'
        run: |
          node --input-type=module -e "
          import fs from 'node:fs';
          for (const file of ['.release-please-manifest.json', 'package.json', 'apps/web/package.json']) {
            JSON.parse(fs.readFileSync(file, 'utf8'));
          }
          if (!fs.readFileSync('CHANGELOG.md', 'utf8').trim()) {
            throw new Error('CHANGELOG.md is empty');
          }
          console.log('Release metadata files validated.');
          "

      - name: Setup Bun
        if: needs.changes.outputs.metadata_only != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun install artifacts
        if: needs.changes.outputs.metadata_only != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Enable Turborepo remote cache
        if: needs.changes.outputs.metadata_only != 'true' && vars.TURBO_TEAM != ''
        run: |
          echo "TURBO_TEAM=${{ vars.TURBO_TEAM }}" >> "$GITHUB_ENV"
          echo "TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun run typecheck

  test:
    name: Test
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Metadata-only fast path
        if: needs.changes.outputs.metadata_only == 'true'
        run: echo "Release metadata only — skipping tests."

      - name: Checkout
        if: needs.changes.outputs.metadata_only != 'true'
        uses: actions/checkout@v6

      - name: Setup Bun
        if: needs.changes.outputs.metadata_only != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun install artifacts
        if: needs.changes.outputs.metadata_only != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Enable Turborepo remote cache
        if: needs.changes.outputs.metadata_only != 'true' && vars.TURBO_TEAM != ''
        run: |
          echo "TURBO_TEAM=${{ vars.TURBO_TEAM }}" >> "$GITHUB_ENV"
          echo "TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Test
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun run test

  lint:
    name: Lint
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Metadata-only fast path
        if: needs.changes.outputs.metadata_only == 'true'
        run: echo "Release metadata only — skipping lint."

      - name: Checkout
        if: needs.changes.outputs.metadata_only != 'true'
        uses: actions/checkout@v6

      - name: Setup Bun
        if: needs.changes.outputs.metadata_only != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun install artifacts
        if: needs.changes.outputs.metadata_only != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun run lint

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.e2e == 'true' && needs.changes.outputs.metadata_only != 'true'
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun install artifacts
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json', 'bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: bun run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY || 'placeholder-key' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_placeholder' }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: placeholder
          NEXT_PUBLIC_SITE_URL: https://placeholder.example.com

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

  build:
    name: Build
    needs: [changes, typecheck, test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Metadata-only fast path
        if: needs.changes.outputs.metadata_only == 'true'
        run: echo "Release metadata only — skipping build."

      - name: Checkout
        if: needs.changes.outputs.metadata_only != 'true'
        uses: actions/checkout@v6

      - name: Setup Bun
        if: needs.changes.outputs.metadata_only != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun install artifacts
        if: needs.changes.outputs.metadata_only != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Enable Turborepo remote cache
        if: needs.changes.outputs.metadata_only != 'true' && vars.TURBO_TEAM != ''
        run: |
          echo "TURBO_TEAM=${{ vars.TURBO_TEAM }}" >> "$GITHUB_ENV"
          echo "TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build
        if: needs.changes.outputs.metadata_only != 'true'
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY || 'placeholder-key' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_placeholder' }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: placeholder
          NEXT_PUBLIC_SITE_URL: https://placeholder.example.com
